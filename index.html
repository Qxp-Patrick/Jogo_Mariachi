<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uma Jornada de el Mariachi</title>
    <style>
        :root {
            --bg-sky: #87CEEB;
            --ground: #8B4513;
            --ui-bg: rgba(255, 255, 255, 0.95);
        }
        
        * { box-sizing: border-box; user-select: none; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-sky);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            width: 100%; height: 100%; max-width: 900px;
            margin: 0 auto; position: relative;
            background: linear-gradient(to bottom, #87CEEB 60%, #8B4513 60%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden;
        }

        .pixel-art { image-rendering: pixelated; }

        /* Estrutura das Telas */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; text-align: center; z-index: 10;
        }
        
        /* Força a exibição da tela ativa */
        .screen.active {
            display: flex !important;
        }

        /* Menu Principal */
        #menu-screen {
            background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px 10px; overflow-y: auto;
            justify-content: flex-start;
        }

        #menu-header { margin-bottom: 15px; width: 100%; }
        
        h1 { font-size: 24px; margin: 5px 0; text-shadow: 2px 2px 0 #ff9800; }
        h2 { font-size: 15px; margin: 5px 0; color: #ffcc00; }

        .btn {
            background: #ff9800; border: 4px solid #fff; color: white;
            padding: 10px 16px; margin: 15px 0; font-size: 14px; font-family: inherit;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 3px 3px 0 #000; transition: transform 0.1s; flex-shrink: 0;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

        .level-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            width: 100%; max-width: 500px; padding: 5px;
        }
        
        .level-btn {
            position: relative; width: 100%; height: 55px;
            background: #4caf50; border: 3px solid #fff; color: white;
            font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .level-btn.locked { background: #555; border-color: #888; }
        .level-btn .check { position: absolute; top: -8px; right: -8px; background: white; border-radius: 50%; font-size: 16px; display: none; border: 2px solid black;}
        .level-btn.perfect .check { display: block; }

        /* Jogo UI */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; min-height: 110px;
            z-index: 20; background: var(--ui-bg); border-bottom: 4px solid #000;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            padding: 8px 10px 15px 10px;
        }
        
        #top-controls {
            width: 100%; display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px;
        }

        .small-btn {
            padding: 6px 10px; font-size: 11px; font-weight: bold; background: #e91e63;
            border: 2px solid #000; color: white; cursor: pointer; text-transform: uppercase;
        }

        #question-area {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        #question-text {
            font-size: 16px; font-weight: bold; color: #000; text-align: center;
            padding: 0 5px; width: 100%; max-width: 700px;
        }
        
        #options-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }
        
        .opt-btn {
            background: #2196F3; border: 3px solid #000; color: white;
            padding: 8px 12px; font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer;
            box-shadow: 2px 2px 0 #000;
        }
        .opt-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #000; }
        
        .col-pt { background: #9c27b0; width: 130px; }
        .col-es { background: #ff9800; width: 130px; }

        /* Cena do Jogo Alinhada com o Solo (40%) */
        #scene { position: absolute; bottom: 40%; left: 0; width: 100%; height: 64px; z-index: 5; }
        
        #mariachi {
            position: absolute; bottom: 0; left: 20px;
            width: 64px; height: 64px;
        }
        
        .obstacle { position: absolute; bottom: 0; }
        #bridge { right: 0; height: 20px; background: #795548; transition: transform 0.5s, opacity 0.5s; border: 2px solid #3e2723; }
        #gate { right: 10%; width: 40px; height: 120px; background: #607d8b; border: 2px solid #263238; transition: transform 0.5s; }
        
        .block-part { height: 20px; background: #795548; border: 1px solid #000; float: left; opacity: 0; transition: opacity 0.3s; }
        .fence { width: 10px; height: 40px; background: #ffcc00; border: 2px solid #d84315; transition: opacity 0.3s; }
        .stone { height: 15px; background: #9e9e9e; border: 2px solid #424242; border-radius: 5px; opacity: 0.3; transition: opacity 0.3s; }
        
        @keyframes drop-fail { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }
        .fail-anim { animation: drop-fail 1s forwards; }

        #confirm-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; display: none;
            justify-content: center; align-items: center;
        }
        .modal-box { background: white; padding: 20px; border: 4px solid black; text-align: center; }
        
        @media (max-width: 600px) {
            #question-text { font-size: 15px; }
            .opt-btn { font-size: 13px; padding: 8px; }
            .col-pt, .col-es { width: 110px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-screen" class="screen active">
        <div id="menu-header">
            <h1>Uma Jornada de<br>el Mariachi</h1>
            <h2>Selecione sua Jornada</h2>
        </div>
        <div class="level-grid" id="level-grid"></div>
        <button class="btn" onclick="resetProgress()" style="background: #d32f2f;">Zerar Progresso</button>
    </div>

    <div id="game-screen" class="screen">

            </div>
            <div id="question-area">
                <div id="question-text">Carregando...</div>
                <div id="options-container"></div>

        </div>

        <div id="scene">

    <div id="confirm-modal">

    /* ================= SINTETIZADOR DE ÁUDIO NATIVO ================= */
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playStepSound() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
    }

    function playCorrectSound() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08);
        osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playWrongSound() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.setValueAtTime(110, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playBuildSound() {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.06);
    }

    function playVictorySound() {
        initAudio();
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.12));
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime + (index * 0.12));
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.12) + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + (index * 0.12));
            osc.stop(audioCtx.currentTime + (index * 0.12) + 0.4);
        });
    }

    function resetProgress() {
        if(confirm("Tem certeza que deseja apagar todo o progresso?")) {
            localStorage.removeItem('mariachi_save_v3');
            gameState = { unlocked: 1, perfectStages: {} };
            renderMenu();
        }
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function returnToMenu() {
        closeConfirm();
        stopWalk();
        clearTimeout(stageTimeout);
        switchScreen('menu-screen');
        renderMenu();
    }

    function renderMenu() {
        const grid = document.getElementById('level-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= TOTAL_STAGES; i++) {
            let btn = document.createElement('button');
            btn.className = `level-btn ${i > gameState.unlocked ? 'locked' : ''} ${gameState.perfectStages[i] ? 'perfect' : ''}`;
            btn.innerHTML = `Fase ${i} <span class="check">✅</span>`;
            if (i <= gameState.unlocked) btn.onclick = () => startStage(i);
            grid.appendChild(btn);
        }
    }

    function showConfirm(text, action) {
        document.getElementById('confirm-text').innerText = text;
        document.getElementById('confirm-modal').style.display = 'flex';
        document.getElementById('btn-yes').onclick = () => { closeConfirm(); action(); };
    }
    function closeConfirm() { document.getElementById('confirm-modal').style.display = 'none'; }

    function skipStage() { perfectRun = false; finishStage(true); }

    /* ================= LÓGICA DE FASE ================= */
    function startStage(stageId) {
        initAudio();
        currentStage = stageId;
        perfectRun = true;
        currentQuestionIndex = 0;
        obstaclesCleared = 0;
        selectedPT = null; expectedES = null;
        
        const mechanics = ['bridge', 'blocks', 'fences', 'stones', 'magic', 'columns'];
        const mechType = mechanics[(stageId - 1) % mechanics.length];
        currentStageData = { type: mechType, total: WORDS_PER_STAGE };
        
        const startIndex = (stageId - 1) * WORDS_PER_STAGE;
        questionsPool = wordDatabase.slice(startIndex, startIndex + WORDS_PER_STAGE);

        setupScene();
        switchScreen('game-screen');
        
        document.getElementById('question-text').innerHTML = '';
        document.getElementById('options-container').innerHTML = '';
        
        loadQuestion();
    }

    function setupScene() {
        const obsContainer = document.getElementById('obstacle-container');
        const mariachi = document.getElementById('mariachi');
        obsContainer.innerHTML = '';
        
        mariachi.style.transition = 'left 0.5s linear, bottom 0.1s linear';
        mariachi.style.left = '20px';
        stopWalk();

        const screenWidth = window.innerWidth || 800;

        if (currentStageData.type === 'bridge') {
            obsContainer.innerHTML = `<div id="bridge" class="obstacle" style="transform: translateY(-200px); width: 120px;"></div>`;
        } else if (currentStageData.type === 'columns') {
            obsContainer.innerHTML = `<div id="gate" class="obstacle" style="transform: translateY(0px);"></div>`;
        } else if (currentStageData.type === 'blocks' || currentStageData.type === 'magic') {
            const blockWidth = Math.min((screenWidth - 150) / 10, 40);
            let html = `<div id="bridge" class="obstacle" style="background: transparent; border: none; width: ${10 * blockWidth}px; right: 50px;">`;
            for(let i=0; i<10; i++) {
                html += `<div class="block-part" id="block-${i}" style="width:${blockWidth}px; background: ${currentStageData.type==='magic'?'#ffeb3b':'#795548'}; box-shadow: ${currentStageData.type==='magic'?'0 0 10px #ffeb3b':'none'}"></div>`;
            }
            html += `</div>`;
            obsContainer.innerHTML = html;
        } else if (currentStageData.type === 'fences' || currentStageData.type === 'stones') {
            let html = '';
            const spacing = (screenWidth - 100) / 10;
            for(let i=0; i<10; i++) {
                let left = 80 + (i * spacing);
                let h = currentStageData.type === 'fences' ? 40 : 15;
                let cls = currentStageData.type === 'fences' ? 'fence' : 'stone obstacle';
                let extraStyle = currentStageData.type === 'stones' ? `width: ${spacing*0.6}px; opacity: 1; bottom: 0;` : '';
                html += `<div class="obstacle ${cls}" id="obs-${i}" style="left: ${left}px; height: ${h}px; ${extraStyle}"></div>`;
            }
            obsContainer.innerHTML = html;
        }
    }

    function loadQuestion() {
        if (currentQuestionIndex >= currentStageData.total || currentQuestionIndex >= questionsPool.length) {
            finishStage(); return;
        }

        const uiOptions = document.getElementById('options-container');
        const uiText = document.getElementById('question-text');

        if (currentStageData.type === 'columns') {
            if (currentQuestionIndex % 5 === 0) {
                let roundWords = questionsPool.slice(currentQuestionIndex, currentQuestionIndex + 5);
                let ptList = [...roundWords].sort(()=>Math.random()-0.5);
                let esList = [...roundWords].sort(()=>Math.random()-0.5);

                uiText.innerHTML = "Associe as palavras: Clique no Português e depois no Espanhol.";
                let html = `<div style="display:flex; gap:10px; width:100%; justify-content:center; flex-wrap: wrap;">`;
                
                html += `<div style="display:flex; flex-direction:column; gap:8px;">`;
                ptList.forEach((w, idx) => {
                    let safeID = "pt-" + idx;
                    html += `<button class="opt-btn col-pt" id="${safeID}" onclick="selectPT('${safeID}', '${w.es}')">${w.pt}</button>`;
                });
                html += `</div>`;

                html += `<div style="display:flex; flex-direction:column; gap:8px;">`;
                esList.forEach((w, idx) => {
                    let safeID = "es-" + idx;
                    html += `<button class="opt-btn col-es" id="${safeID}" onclick="selectES('${safeID}', '${w.es}')">${w.es}</button>`;
                });
                html += `</div></div>`;

                uiOptions.innerHTML = html;
            }
            return;
        }

        const q = questionsPool[currentQuestionIndex];
        
        if (q.phrase) {
            uiText.innerHTML = `Complete a frase:<br><b>"${q.phrase}"</b><br><small>(Dica: Significa "${q.pt}")</small>`;
        } else {
            uiText.innerHTML = `Traduza: "${q.pt}"`;
        }

        let options = [q.es];
        while(options.length < 3) {
            let randWord = wordDatabase[Math.floor(Math.random() * wordDatabase.length)].es;
            if(!options.includes(randWord)) options.push(randWord);
        }
        options.sort(() => Math.random() - 0.5);

        uiOptions.innerHTML = '';
        options.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt, q.es);
            uiOptions.appendChild(btn);
        });
    }

    window.selectPT = function(btnId, esCorrect) {
        initAudio();
        document.querySelectorAll('.col-pt').forEach(b => b.style.borderColor = '#000');
        document.getElementById(btnId).style.borderColor = '#ffeb3b';
        selectedPT = btnId;
        expectedES = esCorrect;
    }

    window.selectES = function(btnId, esText) {
        initAudio();
        if (!selectedPT) return;
        
        if (esText === expectedES) {
            document.getElementById(selectedPT).style.visibility = 'hidden';
            document.getElementById(btnId).style.visibility = 'hidden';
            selectedPT = null; expectedES = null;
            handleAnswer(true, true);
        } else {
            handleAnswer(false, true); 
            document.querySelectorAll('.col-pt').forEach(b => b.style.borderColor = '#000');
            selectedPT = null; expectedES = null;
        }
    }

    function handleAnswer(selected, correct) {
        let isSuccess = (selected === correct) || (selected === true);

        if (isSuccess) {
            playCorrectSound();
            obstaclesCleared++;
            updateObstacleAnimation(true);
            
            if(currentStageData.type === 'fences' || currentStageData.type === 'stones') {
                const screenWidth = window.innerWidth || 800;
                const spacing = (screenWidth - 100) / 10;
                moveMariachi(80 + ((currentQuestionIndex) * spacing)); 
            } else if (currentStageData.type === 'columns') {
                const screenWidth = window.innerWidth || 800;
                const step = (screenWidth - 200) / 10;
                moveMariachi(20 + ((obstaclesCleared) * step)); 
            }
            
            currentQuestionIndex++;

            if (currentStageData.type === 'columns') {
                if (currentQuestionIndex % 5 === 0) setTimeout(loadQuestion, 400);
            } else {
                setTimeout(loadQuestion, 300);
            }

        } else {
            playWrongSound();
            perfectRun = false;
            updateObstacleAnimation(false);
            document.body.style.backgroundColor = "#ffcccc";
            setTimeout(() => { document.body.style.backgroundColor = ""; }, 200);
        }
    }

    function updateObstacleAnimation(isCorrect) {
        if (currentStageData.type === 'bridge') {
            if(isCorrect) {
                playBuildSound();
                let drop = -200 + ( (200 / 10) * obstaclesCleared );
                document.getElementById('bridge').style.transform = `translateY(${drop > 0 ? 0 : drop}px)`;
            }
        } else if (currentStageData.type === 'columns') {
            if(isCorrect) {
                playBuildSound();
                let drop = (120 / 10) * obstaclesCleared;
                document.getElementById('gate').style.transform = `translateY(${drop}px)`;
            }
        }
        else if (currentStageData.type === 'blocks' || currentStageData.type === 'magic') {
            if(isCorrect) {
                playBuildSound();
                document.getElementById(`block-${obstaclesCleared-1}`).style.opacity = 1;
            } else {
                let fake = document.createElement('div');
                fake.className = 'block-part fail-anim';
                fake.style.position = 'absolute';
                fake.style.left = (obstaclesCleared * 30) + 'px';
                document.getElementById('bridge').appendChild(fake);
                setTimeout(() => fake.remove(), 1000);
            }
        }
        else if (currentStageData.type === 'fences') {
            if(isCorrect) {
                playBuildSound();
                let obs = document.getElementById(`obs-${obstaclesCleared-1}`);
                if(obs) obs.style.opacity = '0.2'; 
            }
        }
        else if (currentStageData.type === 'stones') {
            if(isCorrect) {
                playBuildSound();
                let obs = document.getElementById(`obs-${obstaclesCleared-1}`);
                if(obs) obs.style.backgroundColor = '#4caf50'; 
            }
        }
    }

    function finishStage(skipped = false) {
        document.getElementById('question-text').innerHTML = skipped ? 'Fase Pulada!' : 'Jornada Concluída!';
        document.getElementById('options-container').innerHTML = ''; 
        
        if (!skipped) playVictorySound();
        
        if (!skipped && perfectRun) gameState.perfectStages[currentStage] = true;
        if (currentStage >= gameState.unlocked && currentStage < TOTAL_STAGES) gameState.unlocked = currentStage + 1;
        saveData();

        const mariachi = document.getElementById('mariachi');
        mariachi.style.transition = 'left 4s linear'; 
        moveMariachi(window.innerWidth + 100, 4000);
        
        stageTimeout = setTimeout(() => { returnToMenu(); }, 4200);
    }

    /* ================= ANIMAÇÕES MARIACHI ================= */
    function moveMariachi(targetX, customDuration = 500) {
        const mariachi = document.getElementById('mariachi');
        mariachi.style.left = targetX + 'px';
        
        let bounce = false;
        clearInterval(walkInterval);
        walkInterval = setInterval(() => {
            bounce = !bounce;
            mariachi.style.bottom = bounce ? '4px' : '0px';
            document.getElementById('leg1').style.opacity = bounce ? '1' : '0';
            document.getElementById('leg2').style.opacity = bounce ? '0' : '1';
            playStepSound();
        }, 150);

        setTimeout(() => stopWalk(), customDuration);
    }

    function stopWalk() {
        clearInterval(walkInterval);
        const mariachi = document.getElementById('mariachi');
        if(mariachi) {
            mariachi.style.bottom = '0px';
            document.getElementById('leg1').style.opacity = '1';
            document.getElementById('leg2').style.opacity = '1';
        }
    }
</script>
